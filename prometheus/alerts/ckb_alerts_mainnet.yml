groups:
  - name: ckb-mainnet-alerts
    rules:
      - alert: CKBNodeDown
        expr: ckb_node_status{chain="mainnet"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: CKB node is down on {{ $labels.chain }} node {{ $labels.node_name }}
          description: CKB RPC is unavailable and ckb_node_status is {{ printf "%.0f" $value }} on {{ $labels.chain }} node {{ $labels.node_name }}.

      - alert: CKBNoNewBlocks5Minutes
        expr: ckb_block_time_since_last_seconds{chain="mainnet"} > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: No new blocks for 5 minutes on {{ $labels.chain }} node {{ $labels.node_name }}
          description: No new block for {{ $value }}s on {{ $labels.chain }} node {{ $labels.node_name }}.

      - alert: CKBNoNewBlocks10Minutes
        expr: ckb_block_time_since_last_seconds{chain="mainnet"} > 600
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: No new blocks for 10 minutes on {{ $labels.chain }} node {{ $labels.node_name }}
          description: No new block for {{ $value }}s on {{ $labels.chain }} node {{ $labels.node_name }}.

      - alert: CKBOutboundPeersTooLow
        expr: ckb_peers_outbound_count{chain="mainnet"} < 8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Outbound peers too low on {{ $labels.chain }} node {{ $labels.node_name }}
          description: Current outbound peers count is {{ $value }} on {{ $labels.chain }} node {{ $labels.node_name }}.

      - alert: CKBTxPoolSizeTooHigh
        expr: ckb_tx_pool_total_tx_size{chain="mainnet"} > 300000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Tx pool size too high on {{ $labels.chain }} node {{ $labels.node_name }}
          description: Tx pool size is {{ $value }} bytes on {{ $labels.chain }} node {{ $labels.node_name }}.

      - alert: CKBTxPendingTimeTooHigh
        expr: ckb_tx_pool_oldest_pending_seconds{chain="mainnet"} > 600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Oldest pending tx time too high on {{ $labels.chain }} node {{ $labels.node_name }}
          description: Oldest pending tx has been waiting {{ $value }}s on {{ $labels.chain }} node {{ $labels.node_name }}.

      - alert: CKBBannedAddressesCountTooHigh
        expr: ckb_banned_addresses_total{chain="mainnet"} > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Banned addresses count too high on {{ $labels.chain }} node {{ $labels.node_name }}
          description: Banned addresses count is {{ $value }} on {{ $labels.chain }} node {{ $labels.node_name }}.

      - alert: CKBBannedBootnodesCountTooHigh
        expr: ckb_banned_bootnodes_count{chain="mainnet"} > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Banned bootnodes count too high on {{ $labels.chain }} node {{ $labels.node_name }}
          description: Banned bootnodes count is {{ $value }} on {{ $labels.chain }} node {{ $labels.node_name }}.
